<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f8cff"/>
      <stop offset="55%" stop-color="#5b6fe0"/>
      <stop offset="100%" stop-color="#7a4fe0"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c3c9d6"/>
      <stop offset="100%" stop-color="#8b93a6"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#141a2b"/>
      <stop offset="100%" stop-color="#0a0d16"/>
    </radialGradient>
    <!-- carve the crescent: subtract an offset disc from the moon disc -->
    <mask id="crescent">
      <rect width="512" height="512" fill="black"/>
      <circle cx="228" cy="232" r="120" fill="white"/>
      <circle cx="292" cy="212" r="120" fill="black"/>
    </mask>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- outer ring with a small notch top-right (the dark disc overlaps it) -->
  <circle cx="256" cy="232" r="150" fill="none" stroke="url(#ring)" stroke-width="14"/>
  <!-- dark disc that occludes the upper-right of the ring, echoing an eclipse -->
  <circle cx="330" cy="168" r="70" fill="url(#bg)"/>

  <!-- grey crescent moon -->
  <rect width="512" height="512" fill="url(#moon)" mask="url(#crescent)"/>

  <text x="256" y="452" font-family="'DejaVu Sans','Arial',sans-serif" font-size="88"
        font-weight="700" fill="#c3c9d6" text-anchor="middle" letter-spacing="10">UMBRA</text>
</svg>
