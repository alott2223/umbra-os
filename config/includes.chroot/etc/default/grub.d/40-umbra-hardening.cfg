# Umbra OS — hardened kernel command line (KSPP / Kicksecure set).
# Every flag is explained in docs/HARDENING.md. Notable trade-offs:
#   * module.sig_enforce=1 + lockdown=confidentiality block unsigned/out-of-tree
#     modules (DKMS: NVIDIA proprietary, VirtualBox). Remove those two flags if you need them.
#   * mitigations=auto,nosmt disables SMT/Hyper-Threading where it is unsafe.

GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT slab_nomerge init_on_alloc=1 init_on_free=1 page_alloc.shuffle=1 randomize_kstack_offset=on pti=on vsyscall=none debugfs=off oops=panic module.sig_enforce=1 lockdown=confidentiality mce=0 kvm.nx_huge_pages=force iommu.passthrough=0 iommu.strict=1 efi=disable_early_pci_dma random.trust_cpu=off random.trust_bootloader=off mitigations=auto,nosmt apparmor=1"

GRUB_DISABLE_RECOVERY="true"

# Umbra branding for the boot menu
GRUB_DISTRIBUTOR="Umbra OS"
