# Umbra OS — transparent proxy config for the Tor kill-switch.
# Loaded by tor via the %include in /etc/tor/torrc that the branding hook adds.
# Inert until you run: umbra-torswitch on
VirtualAddrNetworkIPv4 10.192.0.0/10
AutomapHostsOnResolve 1
TransPort 127.0.0.1:9040 IsolateClientAddr IsolateClientProtocol IsolateDestAddr IsolateDestPort
DNSPort 127.0.0.1:5353
# Do not act as a relay/exit.
SocksPort 127.0.0.1:9050
