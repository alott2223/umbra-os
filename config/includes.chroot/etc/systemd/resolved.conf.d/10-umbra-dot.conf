# Umbra OS — encrypted DNS over TLS (opsec).
# All DNS is encrypted and authenticated to the upstream. Default is Quad9
# (no-logging, malware-blocking, based in Switzerland). Swap for Mullvad
# (194.242.2.2#dns.mullvad.net) or your own as you prefer.
[Resolve]
DNS=9.9.9.9#dns.quad9.net 2620:fe::fe#dns.quad9.net
FallbackDNS=149.112.112.112#dns.quad9.net 2620:fe::9#dns.quad9.net
# 'opportunistic' (not 'yes'): use encrypted DNS-over-TLS when it's reachable, but
# fall back to normal DNS instead of failing closed. Strict 'yes' breaks the
# internet on networks that block port 853 or during the pre-time-sync window.
# Flip back to 'yes' with:  sudo resolvectl dnsovertls <iface> yes
DNSOverTLS=opportunistic
DNSSEC=allow-downgrade
# Kill the multicast name-resolution leaks that broadcast your hostname/queries
# to the whole LAN.
MulticastDNS=no
LLMNR=no
# Don't cache across networks in a way that reveals prior activity.
Cache=yes
DNSStubListenerExtra=127.0.0.1
