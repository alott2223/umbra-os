; Umbra OS — polybar: TOP info bar + BOTTOM taskbar (mouse-drivable, no Super key needed).

[colors]
bg        = #cc05070d
bg-solid  = #0b0f1c
fg        = #c9d4f0
purple    = #a855f7
violet    = #7c5cff
cyan      = #22d3ee
magenta   = #ff5ecb
green     = #50fa7b
red       = #ff5555
muted     = #5f6f92

[bar/top]
width = 100%
height = 30
bottom = false
background = ${colors.bg}
foreground = ${colors.fg}
line-size = 3
padding = 1
module-margin = 1
separator = "%{F#243049} | %{F-}"
font-0 = JetBrains Mono:size=10;3
font-1 = Hack:size=10;3
font-2 = FontAwesome:size=11;3
font-3 = Terminus:size=12;3
modules-left = umbra
modules-center = title
modules-right = cpu memory filesystem network date
cursor-click = pointer
enable-ipc = true
wm-restack = i3

[bar/bottom]
width = 100%
height = 34
bottom = true
background = ${colors.bg}
foreground = ${colors.fg}
line-size = 3
padding = 1
module-margin = 0
font-0 = JetBrains Mono:size=10;3
font-1 = Hack:size=10;3
font-2 = FontAwesome:size=12;3
font-3 = Terminus:size=12;3
modules-left = launcher sep ff term files keepass settings monitor screenshot opsec
modules-center = i3
modules-right = closewin pulseaudio tray clock powerbtn
cursor-click = pointer
enable-ipc = true
wm-restack = i3

;================= TOP: info modules =================
[module/umbra]
type = custom/text
content = "  UMBRA  "
content-foreground = #05070d
content-background = ${colors.purple}
content-font = 1
click-left = rofi -show drun -theme /etc/rofi/umbra.rasi &

[module/title]
type = internal/xwindow
label = %title:0:90:...%
label-foreground = ${colors.muted}

[module/cpu]
type = internal/cpu
interval = 2
label = " CPU %percentage%%"
label-foreground = ${colors.green}

[module/memory]
type = internal/memory
interval = 3
label = " MEM %percentage_used%%"
label-foreground = ${colors.cyan}

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
label-mounted = " DISK %percentage_used%%"
label-mounted-foreground = ${colors.violet}
label-unmounted =

[module/network]
type = internal/network
interface-type = wired
interval = 3
label-connected = " NET %{F#50fa7b}up%{F-}"
label-disconnected = " NET %{F#ff5555}down%{F-}"

[module/date]
type = internal/date
interval = 1
date = "%a %b %d"
time = "%H:%M:%S"
label = " %date%  %{F#a855f7}%time%%{F-}"

[module/power]
type = custom/text
content = "  ⏻  "
content-foreground = #05070d
content-background = ${colors.red}
click-left = ~/.config/umbra-power.sh 2>/dev/null || i3-nagbar -t warning -m Power -B Lock 'i3lock -n -c 05070d' -B Logout 'i3-msg exit' -B Reboot 'systemctl reboot' -B Off 'systemctl poweroff'

;================= BOTTOM: taskbar =================
[module/launcher]
type = custom/text
content = "  ≡ APPS  "
content-foreground = #05070d
content-background = ${colors.purple}
content-font = 1
click-left = rofi -show drun -theme /etc/rofi/umbra.rasi &

[module/sep]
type = custom/text
content = "  "

[module/ff]
type = custom/text
content = "  Firefox "
content-foreground = ${colors.fg}
click-left = firefox-esr &

[module/term]
type = custom/text
content = "  Term "
content-foreground = ${colors.fg}
click-left = alacritty &

[module/files]
type = custom/text
content = "  Files "
content-foreground = ${colors.fg}
click-left = nautilus &

[module/keepass]
type = custom/text
content = "  Keys "
content-foreground = ${colors.fg}
click-left = keepassxc &

[module/settings]
type = custom/text
content = "  Settings "
content-foreground = ${colors.fg}
click-left = gnome-control-center &

[module/monitor]
type = custom/text
content = "  Monitor "
content-foreground = ${colors.fg}
click-left = alacritty --title btop -e btop &

[module/screenshot]
type = custom/text
content = "  Shot "
content-foreground = ${colors.fg}
click-left = flameshot gui &

[module/opsec]
type = custom/text
content = "  ●  opsec "
content-foreground = ${colors.magenta}
click-left = alacritty --title "Umbra Security" -e bash -c "umbra; echo; read -p 'press enter to close'" &

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
enable-scroll = true
label-focused = %name%
label-focused-background = ${colors.bg-solid}
label-focused-foreground = ${colors.cyan}
label-focused-underline = ${colors.purple}
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding = 2
label-visible = %name%
label-visible-foreground = ${colors.fg}
label-visible-padding = 2
label-urgent = %name%
label-urgent-foreground = #05070d
label-urgent-background = ${colors.red}
label-urgent-padding = 2

[module/closewin]
type = custom/text
content = "  ✕ Close  "
content-foreground = #05070d
content-background = ${colors.red}
click-left = i3-msg kill &

[module/pulseaudio]
type = internal/pulseaudio
label-volume = "  VOL %percentage%%"
label-volume-foreground = ${colors.magenta}
label-muted = "  MUTED"
label-muted-foreground = ${colors.muted}
click-right = pavucontrol &

[module/tray]
type = internal/tray
tray-size = 16
tray-spacing = 6
tray-background = ${colors.bg-solid}

[module/clock]
type = internal/date
interval = 1
time = "%H:%M"
label = "  %{F#a855f7}%time%%{F-} "

[module/powerbtn]
type = custom/text
content = "  ⏻  "
content-foreground = #05070d
content-background = ${colors.red}
click-left = i3-nagbar -t warning -m Power -B Lock 'i3lock -n -c 05070d' -B Logout 'i3-msg exit' -B Reboot 'systemctl reboot' -B Off 'systemctl poweroff'

[settings]
screenchange-reload = true
pseudo-transparency = true
