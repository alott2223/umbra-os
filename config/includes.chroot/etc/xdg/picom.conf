// Umbra OS — picom compositor. xrender backend for VM/GPU-less reliability
// (glx blur is skipped so it always starts; transparency + shadows + rounded corners
//  still give the premium look). On real hardware you can switch backend to "glx"
//  and enable blur.

backend = "xrender";
vsync = true;

// rounded corners
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "class_g = 'Polybar'",
  "class_g = 'i3-frame'"
];

// shadows
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.55;
shadow-offset-x = -18;
shadow-offset-y = -18;
shadow-color = "#000000";
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];

// fading
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 6;

// transparency
frame-opacity = 0.9;
inactive-opacity = 0.92;
active-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
  "94:class_g = 'Alacritty' && focused",
  "86:class_g = 'Alacritty' && !focused",
  "96:class_g = 'Rofi'",
  "100:class_g = 'firefox-esr'",
  "100:fullscreen"
];

// misc
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
