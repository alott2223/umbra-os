#!/usr/sbin/nft -f
# Umbra OS firewall — default-deny inbound, stateful, IPv4+IPv6.
# This is the NORMAL ruleset. The Tor kill-switch (umbra-torswitch on) swaps in
# a different ruleset from /etc/umbra/tor-killswitch.nft and restores this on 'off'.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        ct state established,related accept
        ct state invalid drop

        iif "lo" accept
        iif != "lo" ip daddr 127.0.0.0/8 drop
        iif != "lo" ip6 daddr ::1 drop

        icmpv6 type { destination-unreachable, packet-too-big, time-exceeded,
                      parameter-problem, nd-neighbor-solicit,
                      nd-neighbor-advert } accept

        # Rate-limited ping (delete to go dark)
        icmp type echo-request limit rate 4/second accept
        icmpv6 type echo-request limit rate 4/second accept

        # DHCPv6 client
        ip6 saddr fe80::/10 udp dport 546 accept

        # --- open inbound service ports here, e.g.: ---
        # tcp dport 22 ct state new limit rate 4/minute accept comment "ssh"
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy accept;
        # Egress filtering template (paranoid): set policy drop and allow explicitly.
        # oif "lo" accept
        # ct state established,related accept
        # udp dport { 53, 123, 4460 } accept
        # tcp dport { 53, 80, 443, 853, 9001, 9030 } accept comment "web, dot, tor"
    }
}
