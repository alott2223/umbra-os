# Umbra OS — authenticated time sync (NTS). Unauthenticated NTP lets a network
# attacker skew the clock to replay expired certs/revocations.
server time.cloudflare.com iburst nts
server virginia.time.system76.com iburst nts
server ntppool1.time.nl iburst nts
minsources 2
authselectmode require
makestep 1.0 3
