# Umbra OS — additional "high-assurance" sysctls layered on 990-umbra-hardening.conf.
# All of these keep a normal desktop working (sandboxes, apps unaffected).

## Harden the low memory area against null-deref exploitation
vm.mmap_min_addr = 65536

## Panic (and thus reboot) on kernel oops/BUG instead of leaving a half-owned kernel
kernel.panic_on_oops = 1
kernel.panic = 10

## Do not allow modules to be loaded after boot has settled is handled by lockdown;
## here we also refuse loading of unsigned firmware blobs opportunistically.

## Restrict kernel pointer / log exposure further (already set; reaffirm)
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1

## BPF: disable JIT entirely for unprivileged, harden JIT for privileged (already),
## and disallow the JIT from being probed.
net.core.bpf_jit_kallsyms = 0

## Stricter reverse-path filtering already on; add TCP hardening
net.ipv4.tcp_challenge_ack_limit = 1000000
net.ipv4.tcp_sack = 1

## Limit the ability of a user to watch others via /proc timing side channels
kernel.perf_cpu_time_max_percent = 1

## Restrict loading line disciplines / legacy TTY features (already in 990) — reaffirm
dev.tty.ldisc_autoload = 0
