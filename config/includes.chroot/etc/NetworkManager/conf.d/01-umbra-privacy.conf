# Umbra OS — NetworkManager privacy hardening.
[main]
# DNS: NetworkManager writes the network-provided resolver straight to
# /etc/resolv.conf so name resolution ALWAYS works out of the box (like a normal
# distro). Encrypted DNS-over-TLS is one command away and off by default:
#   sudo umbra dns secure     (routes DNS through systemd-resolved + Quad9 DoT)
# This avoids the failure mode where strict DoT / a dead stub resolver breaks all
# DNS on networks that filter port 853.
dns=default

[connection]
# RFC 7844 anonymity profile: send a minimal DHCP fingerprint (no hostname,
# no vendor class), so DHCP servers learn as little as possible about you.
ipv4.dhcp-send-hostname=false
ipv6.dhcp-send-hostname=false
ipv4.dhcp-client-id=none
# IPv6 privacy extensions (temporary addresses preferred).
ipv6.ip6-privacy=2
