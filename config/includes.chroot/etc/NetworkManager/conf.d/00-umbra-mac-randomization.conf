# Umbra OS — MAC address randomization (opsec).
# Prevents passive tracking of your hardware across networks.
#
#   * Wi-Fi scans use a random MAC (you don't leak your real MAC just by looking).
#   * Every connection uses a MAC that is randomized but STABLE per-network+day,
#     so captive portals and DHCP leases don't flap, yet networks can't correlate
#     you across time. Use "random" instead of "stable" for a fresh MAC every
#     connect (breaks some captive portals).
[device-mac-randomization]
wifi.scan-rand-mac-address=yes

[connection-mac-randomization]
ethernet.cloned-mac-address=stable
wifi.cloned-mac-address=stable

[connection]
# Rotate the stable-id daily so the "stable" MAC is not stable forever.
connection.stable-id=${CONNECTION}/${BOOT}
